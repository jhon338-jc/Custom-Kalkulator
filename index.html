<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4c1d95">
    <meta name="description" content="Kalkulator dengan custom CSS - Generate dengan AI!">
    <title>⚡ Deep Jhon CSS Kalkulator</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/style.css">
    <style id="custom-css"></style>
</head>
<body>
    <div class="app">
        <!-- SISI KIRI - EDITOR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <h1>Deep Jhon<span>CSS</span></h1>
                </div>
                <p>Tempel / Generate CSS untuk kalkulator kamu!</p>
            </div>
            
            <!-- AREA PROMPT AI -->
            <div class="ai-prompt-area">
                <div class="prompt-label">
                    <span>🤖 AI Prompt Generator</span>
                    <button id="copyPromptBtn" class="copy-prompt-btn" title="Salin prompt">📋 Salin</button>
                </div>
                <textarea id="aiPrompt" rows="3" placeholder="Contoh prompt untuk AI:&#10;&#10;'Buatkan CSS untuk kalkulator dengan tema galaxy, warna ungu keemasan, tombol bulat, efek glow, font sci-fi'"></textarea>
                <button id="generateWithAI" class="ai-generate-btn">
                    <span>✨</span> Generate dengan AI
                </button>
                <div class="ai-note">
                    💡 <strong>Copy prompt di atas</strong> → tempel ke ChatGPT/Claude/Gemini → hasil CSS tempel di bawah
                </div>
            </div>
            
            <!-- EDITOR CSS -->
            <div class="editor-area">
                <div class="editor-toolbar">
                    <span class="editor-title">📝 Kode CSS Kamu</span>
                    <div class="toolbar-buttons">
                        <button id="clearBtn" class="icon-btn" title="Hapus semua">🗑️</button>
                        <button id="resetBtn" class="icon-btn" title="Reset ke default">🔄</button>
                    </div>
                </div>
                <textarea id="cssInput" placeholder="/* Tulis atau tempel CSS custom kamu di sini */
/* Hasil dari AI bisa langsung tempel di sini! */

.calculator {
    background: linear-gradient(135deg, #4c1d95, #7c3aed);
    border-radius: 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.display {
    background: #2d1b4e;
    color: #e9d5ff;
}

.btn {
    background: #3b1e6b;
    color: #e9d5ff;
    border-radius: 16px;
}

.btn:hover {
    background: #7c3aed;
    transform: scale(1.02);
}"></textarea>
            </div>
            
            <div class="action-buttons">
                <button id="applyBtn" class="btn-primary">✨ Terapkan CSS</button>
            </div>
            
            <div class="templates">
                <h3>📚 Template Siap Pakai</h3>
                <div class="template-grid">
                    <button class="template-card" data-template="dark-purple">🟣 Dark Ungu</button>
                    <button class="template-card" data-template="neon">💚 Neon Hijau</button>
                    <button class="template-card" data-template="glass">🔮 Glassmorph</button>
                    <button class="template-card" data-template="galaxy">🌌 Galaxy</button>
                    <button class="template-card" data-template="minimal">⚪ Minimalis</button>
                    <button class="template-card" data-template="sunset">🌅 Sunset</button>
                </div>
            </div>
        </aside>
        
        <!-- SISI KANAN - PREVIEW KALKULATOR -->
        <main class="main">
            <div class="calculator-preview">
                <div class="preview-label">📱 Live Preview</div>
                <div class="calculator">
                    <div class="display">
                        <div class="previous-operand" id="previousOperand"></div>
                        <div class="current-operand" id="currentOperand">0</div>
                    </div>
                    <div class="buttons-grid">
                        <button class="btn btn-function" data-action="clear">AC</button>
                        <button class="btn btn-function" data-action="delete">⌫</button>
                        <button class="btn btn-operator" data-operator="%">%</button>
                        <button class="btn btn-operator" data-operator="/">÷</button>
                        
                        <button class="btn btn-number" data-number="7">7</button>
                        <button class="btn btn-number" data-number="8">8</button>
                        <button class="btn btn-number" data-number="9">9</button>
                        <button class="btn btn-operator" data-operator="*">×</button>
                        
                        <button class="btn btn-number" data-number="4">4</button>
                        <button class="btn btn-number" data-number="5">5</button>
                        <button class="btn btn-number" data-number="6">6</button>
                        <button class="btn btn-operator" data-operator="-">−</button>
                        
                        <button class="btn btn-number" data-number="1">1</button>
                        <button class="btn btn-number" data-number="2">2</button>
                        <button class="btn btn-number" data-number="3">3</button>
                        <button class="btn btn-operator" data-operator="+">+</button>
                        
                        <button class="btn btn-number zero" data-number="0">0</button>
                        <button class="btn btn-number" data-number=".">.</button>
                        <button class="btn btn-equals" data-action="equals">=</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="toast" class="toast"></div>

    <script src="/js/calculator.js"></script>
    <script src="/js/custom-css.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
            });
        }
    </script>
</body>
</html>
